models:
  Purchase/PurchasePayment:
    id: char(26)
    purchase_id: char(26) index
    payment_id: char(26) index
    amount: decimal
    created_by: char(26) foreign:users
    updated_by: char(26) foreign:users nullable
    deleted_by: char(26) foreign:users nullable
    timestamps: true
controllers:
  Purchase/PurchasePayment:
    resource: api
seeders: Purchase/PurchasePayment
